server {
    listen 80;
    
    # Essential for correct JS/CSS loading
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Prevents Nginx from redirecting to http when adding trailing slashes
    # and keeps redirects relative to the scheme/host provided by the proxy
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Handle the primary subpath
    location /women_wellness_selfcare/ {
        # Using root instead of alias to avoid common try_files issues
        root /usr/share/nginx/html;
        try_files $uri $uri/ /women_wellness_selfcare/index.html;
        
        # Add headers for security and stability
        add_header X-Frame-Options "ALLOWALL"; # Allow embedding in Mantracare dash
        add_header X-Content-Type-Options "nosniff";
    }

    # Fallback for root requests or path-stripped requests
    location / {
        try_files $uri $uri/ /women_wellness_selfcare/index.html;
    }

    # Handle static assets explicitly to ensure MIME types
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        # Check both subpath and root for the file
        try_files $uri /women_wellness_selfcare$uri =404;
    }

    # Redirect root to subpath for direct access
    location = / {
        return 301 /women_wellness_selfcare/;
    }

    error_page 404 /women_wellness_selfcare/index.html;
}
