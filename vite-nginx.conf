server {
    listen 80;
    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Important for preserving the HTTPS scheme from the proxy
    absolute_redirect off;

    root /usr/share/nginx/html;
    index index.html;

    # Main application location
    location /women_wellness_selfcare/ {
        # Check if file exists, then check if it's a directory, then fallback to index.html
        try_files $uri $uri/ /women_wellness_selfcare/index.html;
        
        add_header X-Frame-Options "ALLOWALL";
        add_header X-Content-Type-Options "nosniff";
    }

    # Explicitly handle assets to ensure they don't fallback to index.html
    # This prevents the browser from trying to load index.html as a JS/CSS file
    location /women_wellness_selfcare/assets/ {
        try_files $uri =404;
    }

    # Redirect root domain access to the application subpath
    location = / {
        return 302 /women_wellness_selfcare/;
    }

    # Catch-all fallback for path-stripped requests
    location / {
        try_files $uri $uri/ /women_wellness_selfcare/index.html;
    }

    # Health check or errors
    error_page 404 /women_wellness_selfcare/index.html;
}
