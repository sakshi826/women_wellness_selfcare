server {
    listen 80;
    
    # Essential for correct JS/CSS loading
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    root /usr/share/nginx/html;
    index index.html;

    # Handle the primary subpath
    location /women_wellness_selfcare/ {
        alias /usr/share/nginx/html/women_wellness_selfcare/;
        try_files $uri $uri/ /women_wellness_selfcare/index.html;
        
        # Add headers for caching and stability
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
    }

    # Fallback for root requests or path-stripped requests
    location / {
        try_files $uri $uri/ /women_wellness_selfcare/index.html;
    }

    # Handle static assets explicitly to ensure MIME types
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
        try_files $uri $uri/ /women_wellness_selfcare$uri =404;
    }

    # Redirect root to subpath for direct access
    location = / {
        return 301 /women_wellness_selfcare/;
    }

    error_page 404 /women_wellness_selfcare/index.html;
}
